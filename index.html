<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resold. – Luxury Minimal Resale</title>

    <style>
        /* ------------------------------
           GLOBAL
        --------------------------------*/
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", Roboto, sans-serif;
            background: url("[images.unsplash.com](https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=2000&q=80)")
                center/cover fixed no-repeat;
            color: #111;
        }

        /* Soft white overlay to keep it minimal */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(6px);
            z-index: -1;
        }

        /* ------------------------------
           HEADER
        --------------------------------*/
        header {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-content {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        nav button {
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 0.55rem 1.1rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 150ms ease;
        }

        nav button:hover {
            background: black;
        }

        .cart-count {
            font-size: 0.75rem;
            margin-left: 6px;
        }

        /* ------------------------------
           MAIN CONTENT
        --------------------------------*/
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        /* ------------------------------
           PRODUCT GRID
        --------------------------------*/
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.4rem;
        }

        .product-card {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(14px);
            border-radius: 16px;
            border: 1px solid rgba(0,0,0,0.06);
            overflow: hidden;
            transition: 180ms ease;
            padding-bottom: 1rem;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .product-image {
            width: 100%;
            height: 190px;
            object-fit: cover;
            background: rgba(0,0,0,0.05);
        }

        .product-info {
            padding: 1rem;
        }

        .product-category {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #444;
            margin-bottom: 0.3rem;
            letter-spacing: 0.5px;
        }

        .product-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .product-condition {
            color: #555;
            margin-bottom: 0.6rem;
            font-size: 0.9rem;
        }

        .product-price {
            font-weight: 600;
            font-size: 1.2rem;
        }

        .btn {
            cursor: pointer;
            border-radius: 10px;
            padding: 0.65rem;
            border: none;
            width: 100%;
            transition: 150ms ease;
        }

        .btn-primary {
            background: black;
            color: white;
        }

        .btn-primary:hover {
            background: #222;
        }

        /* ------------------------------
           MODALS (Luxury Glass)
        --------------------------------*/
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            z-index: 100;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(14px);
            border-radius: 16px;
            padding: 1.4rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(0,0,0,0.06);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            opacity: 0.6;
            cursor: pointer;
        }

        .modal-close:hover {
            opacity: 1;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.65rem;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(6px);
        }

        textarea {
            resize: vertical;
        }

        /* ------------------------------
           SIMPLE LISTS (Cart/Admin)
        --------------------------------*/
        .cart-item, .admin-item {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        /* ------------------------------
           TOAST
        --------------------------------*/
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            color: white;
            padding: 0.9rem 1.4rem;
            border-radius: 8px;
            opacity: 0;
            transition: 180ms ease;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>

<body>

<header>
    <div class="header-content">
        <div class="logo">Resold.</div>
        <nav>
            <button onclick="openModal('addItem')">Add Item</button>
            <button onclick="openModal('cart')">Cart <span class="cart-count" id="cartCount">0</span></button>
            <button onclick="openModal('admin')">Manage</button>
        </nav>
    </div>
</header>

<main>
    <h2 class="section-title">Items for Sale</h2>

    <div id="productGrid" class="product-grid"></div>
    <div id="emptyState" style="display:none; padding:1rem; color:#333;">No items yet.</div>
</main>

<!-- ------------------------------
     ADD ITEM MODAL
---------------------------------->
<div class="modal-overlay" id="addItemModal">
    <div class="modal">
        <div class="modal-header">
            <h2>Add Item</h2>
            <button class="modal-close" onclick="closeModal('addItem')">&times;</button>
        </div>

        <form id="addItemForm" onsubmit="addItem(event)">
            <div class="form-group">
                <label>Title *</label>
                <input id="itemTitle" required>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="itemCategory">
                    <option>Clothing</option>
                    <option>Electronics</option>
                    <option>Home</option>
                    <option>Sports</option>
                    <option>Books</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Condition</label>
                <select id="itemCondition">
                    <option>New</option>
                    <option>Like New</option>
                    <option>Good</option>
                    <option>Fair</option>
                </select>
            </div>

            <div class="form-group">
                <label>Price *</label>
                <input type="number" id="itemPrice" required min="0" step="0.01">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="itemDescription"></textarea>
            </div>

            <div class="form-group">
                <label>Image URL</label>
                <input id="itemImage">
            </div>

            <button class="btn btn-primary">List Item</button>
        </form>
    </div>
</div>

<!-- ------------------------------
     CART MODAL
---------------------------------->
<div class="modal-overlay" id="cartModal">
    <div class="modal">
        <div class="modal-header">
            <h2>Your Cart</h2>
            <button class="modal-close" onclick="closeModal('cart')">&times;</button>
        </div>

        <div id="cartItems"></div>

        <div style="display:flex; justify-content:space-between; font-weight:600; margin-top:1rem;" id="cartTotal">
            <span>Total:</span>
            <span id="totalAmount">$0.00</span>
        </div>

        <button class="btn btn-primary" style="margin-top:1rem;" id="checkoutBtn" onclick="checkout()">Checkout</button>
    </div>
</div>

<!-- ------------------------------
     ADMIN MODAL
---------------------------------->
<div class="modal-overlay" id="adminModal">
    <div class="modal">
        <div class="modal-header">
            <h2>Manage Items</h2>
            <button class="modal-close" onclick="closeModal('admin')">&times;</button>
        </div>

        <div id="adminItems"></div>
    </div>
</div>

<!-- ------------------------------
     CHECKOUT MODAL
---------------------------------->
<div class="modal-overlay" id="checkoutModal">
    <div class="modal">
        <div class="modal-header">
            <h2>Checkout</h2>
            <button class="modal-close" onclick="closeModal('checkout')">&times;</button>
        </div>

        <form id="checkoutForm" onsubmit="processCheckout(event)">
            <div class="form-group">
                <label>Name *</label>
                <input id="customerName" required>
            </div>

            <div class="form-group">
                <label>Email *</label>
                <input id="customerEmail" type="email" required>
            </div>

            <div class="form-group">
                <label>Address *</label>
                <textarea id="customerAddress" required></textarea>
            </div>

            <button class="btn btn-primary" style="margin-top:1rem;">Place Order</button>
        </form>
    </div>
</div>

<!-- ------------------------------
     TOAST
---------------------------------->
<div id="toast" class="toast"></div>

<!-- ------------------------------
     SCRIPT
---------------------------------->
<script>
let products = JSON.parse(localStorage.getItem("luxProducts")) || [];
let cart = JSON.parse(localStorage.getItem("luxCart")) || [];

document.addEventListener("DOMContentLoaded", () => {
    renderProducts();
    updateCartCount();
});

/* STORAGE HELPERS */
function saveProducts() { localStorage.setItem("luxProducts", JSON.stringify(products)); }
function saveCart() { localStorage.setItem("luxCart", JSON.stringify(cart)); }

/* RENDER PRODUCTS */
function renderProducts() {
    const grid = document.getElementById("productGrid");
    const empty = document.getElementById("emptyState");

    if (products.length === 0) {
        grid.style.display = "none";
        empty.style.display = "block";
        return;
    }

    empty.style.display = "none";
    grid.style.display = "grid";

    grid.innerHTML = products.map(p => `
        <div class="product-card">
            ${p.image
                ? `<img class="product-image" src="${p.image}" onerror="this.style.display='none'"/>`
                : `<div class="product-image"></div>`
            }
            <div class="product-info">
                <div class="product-category">${p.category}</div>
                <div class="product-title">${p.title}</div>
                <div class="product-condition">${p.condition}</div>
                <div class="product-price">$${p.price.toFixed(2)}</div>
            </div>
            <button class="btn btn-primary" onclick="addToCart('${p.id}')">Add to Cart</button>
        </div>
    `).join("");
}

/* ADD ITEM */
function addItem(e) {
    e.preventDefault();

    const item = {
        id: Date.now().toString(),
        title: itemTitle.value,
        category: itemCategory.value,
        condition: itemCondition.value,
        price: parseFloat(itemPrice.value),
        description: itemDescription.value,
        image: itemImage.value
    };

    products.push(item);
    saveProducts();
    renderProducts();
    closeModal("addItem");
    addItemForm.reset();
    toast("Item added");
}

/* CART */
function addToCart(id) {
    if (cart.find(i => i.id === id)) return toast("Already in cart");
    const item = products.find(p => p.id === id);
    cart.push(item);
    saveCart();
    updateCartCount();
    toast("Added to cart");
}

function updateCartCount() {
    cartCount.textContent = cart.length;
}

function renderCart() {
    const container = document.getElementById("cartItems");

    if (cart.length === 0) {
        container.innerHTML = "<p>Your cart is empty.</p>";
        checkoutBtn.style.display = "none";
        cartTotal.style.display = "none";
        return;
    }

    container.innerHTML = cart.map(i => `
        <div class="cart-item">
            <div>
                <strong>${i.title}</strong><br>
                $${i.price.toFixed(2)}
            </div>
            <button style="background:none; border:none; font-size:1.2rem;" onclick="removeFromCart('${i.id}')">&times;</button>
        </div>
    `).join("");

    const total = cart.reduce((a, b) => a + b.price, 0);
    totalAmount.textContent = "$" + total.toFixed(2);

    checkoutBtn.style.display = "block";
    cartTotal.style.display = "flex";
}

function removeFromCart(id) {
    cart = cart.filter(i => i.id !== id);
    saveCart();
    updateCartCount();
    renderCart();
}

function checkout() {
    closeModal("cart");
    openModal("checkout");
}

/* ADMIN */
function renderAdmin() {
    adminItems.innerHTML = products.map(p => `
        <div class="admin-item">
            <div>
                <strong>${p.title}</strong><br>
                $${p.price.toFixed(2)}
            </div>
            <button onclick="deleteProduct('${p.id}')" class="btn btn-primary" style="background:#333;">Delete</button>
        </div>
    `).join("");
}

function deleteProduct(id) {
    products = products.filter(p => p.id !== id);
    cart = cart.filter(c => c.id !== id);
    saveProducts();
    saveCart();
    renderProducts();
    updateCartCount();
    renderAdmin();
    toast("Item removed");
}

/* CHECKOUT */
function processCheckout(e) {
    e.preventDefault();
    cart = [];
    saveCart();
    updateCartCount();
    renderProducts();
    closeModal("checkout");
    toast("Order placed");
}

/* MODALS */
function openModal(name) {
    if (name === "cart") renderCart();
    if (name === "admin") renderAdmin();
    document.getElementById(name + "Modal").classList.add("active");
}

function closeModal(name) {
    document.getElementById(name + "Modal").classList.remove("active");
}

/* TOAST */
function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1800);
}
</script>

</body>
</html>
